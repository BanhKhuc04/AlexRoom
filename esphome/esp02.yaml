esphome:
  name: esp02
  friendly_name: ESP02 Plant A

esp8266:
  board: nodemcuv2

# Hiển thị log khi cắm USB hoặc xem qua ESPHome
logger:
  level: INFO

# Kết nối Wi-Fi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Wi-Fi dự phòng nếu không kết nối được router
  ap:
    ssid: "ESP02 Fallback"
    password: "esp02fallback"

captive_portal:

# Kết nối MQTT đến Orange Pi
mqtt:
  broker: 192.168.0.174
  port: 1883

  username: !secret mqtt_esp02_username
  password: !secret mqtt_esp02_password

  topic_prefix: alex/device/esp02

  # ESP khởi động và kết nối thành công
  birth_message:
    topic: alex/device/esp02/availability
    payload: online
    retain: true

  # ESP mất nguồn hoặc mất kết nối bất thường
  will_message:
    topic: alex/device/esp02/availability
    payload: offline
    retain: true

  # ESP tắt hoặc khởi động lại bình thường
  shutdown_message:
    topic: alex/device/esp02/availability
    payload: offline
    retain: true

# Cho phép cập nhật firmware qua Wi-Fi
ota:
  - platform: esphome
    password: !secret ota_esp02_password

# Đọc chân DO của module cảm biến độ ẩm
binary_sensor:
  - platform: gpio
    id: plant_a_soil_dry
    name: "Plant A Soil Dry"

    pin:
      number: GPIO13   # D7 trên NodeMCU
      mode: INPUT
      inverted: false

    # Chống trạng thái ON/OFF nhảy liên tục gần ngưỡng
    filters:
      - delayed_on: 700ms
      - delayed_off: 700ms