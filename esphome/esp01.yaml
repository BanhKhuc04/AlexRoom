esphome:
  name: esp01
  friendly_name: ESP01 Relay Test

esp8266:
  board: nodemcuv2

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "ESP01 Fallback"
    password: "esp01fallback"

captive_portal:

mqtt:
  broker: 192.168.0.174
  port: 1883
  username: !secret mqtt_esp01_username
  password: !secret mqtt_esp01_password
  topic_prefix: alex/device/esp01

  birth_message:
    topic: alex/device/esp01/availability
    payload: online
    retain: true

  will_message:
    topic: alex/device/esp01/availability
    payload: offline
    retain: true

  shutdown_message:
    topic: alex/device/esp01/availability
    payload: offline
    retain: true

ota:
  - platform: esphome
    password: !secret ota_password

switch:
  - platform: gpio
    id: relay_1
    name: "Relay 1"
    pin:
      number: GPIO5
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_2
    name: "Relay 2"
    pin:
      number: GPIO4
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_3
    name: "Relay 3"
    pin:
      number: GPIO14
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_4
    name: "Relay 4"
    pin:
      number: GPIO12
      inverted: true
    restore_mode: ALWAYS_OFF